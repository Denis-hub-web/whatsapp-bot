services:
  - type: web
    name: whatsapp-bot
    env: node
    region: oregon
    plan: starter
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: AUTH_DIR
        value: /data/auth_info
      - key: NODE_ENV
        value: production
    disk:
      name: whatsapp-session
      mountPath: /data
      sizeGB: 1
